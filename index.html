<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags for character encoding and responsive design -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title of the page -->
  <title>Login Page</title>

  <!-- Link to external CSS file for styling -->
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Main container for the login form -->
  <div class="login-container">
    <!-- Heading for the login form -->
    <h2>Login</h2>

    <!-- Login form with an ID for JavaScript handling -->
    <form id="loginForm">
      <!-- Form group for the email input -->
      <div class="form-group">
        <!-- Label for the email input field -->
        <label for="email">Email</label>

        <!-- Email input field with placeholder and required attribute -->
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <!-- Error message container for email validation -->
        <small class="error-message" id="emailError"></small>
      </div>

      <!-- Form group for the password input -->
      <div class="form-group">
        <!-- Label for the password input field -->
        <label for="password">Password</label>

        <!-- Password input field with placeholder and required attribute -->
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <!-- Error message container for password validation -->
        <small class="error-message" id="passwordError"></small>
      </div>

      <!-- "Forgot Password?" link -->
      <a href="#" class="forgot-password">Forgot Password?</a>

      <!-- Login button to submit the form -->
      <button type="submit" class="login-button">Login</button>
    </form>
  </div>

  <!-- Link to external JavaScript file for form validation -->
  <script src="scripts.js"></script>
</body>
</html>
